services:
  postgres:
    image: postgres:15-alpine
    container_name: auth-sut-postgres
    environment:
      POSTGRES_DB: auth_sut
      POSTGRES_USER: auth
      POSTGRES_PASSWORD: auth
    ports:
      - "5433:5432"
    volumes:
      - ./auth-backend/sql/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./auth-backend/sql/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auth -d auth_sut"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: auth-sut-redis
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  mailhog:
    image: mailhog/mailhog:latest
    container_name: auth-sut-mailhog
    ports:
      - "1025:1025"
      - "8025:8025"
